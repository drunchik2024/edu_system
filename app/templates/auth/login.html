<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — ВГТУ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { vgtu: { dark: '#263045', gold: '#c8a96e' } } } }
    }
  </script>
  <style>body { font-family: Arial, Helvetica, sans-serif; }</style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
  <div class="w-full max-w-md">
    <!-- Заголовок -->
    <div class="bg-vgtu-dark rounded-t-lg px-8 py-6 text-center">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none" class="mx-auto mb-3">
        <rect width="48" height="48" rx="6" fill="#c8a96e"/>
        <text x="24" y="32" text-anchor="middle" font-family="Arial" font-weight="700" font-size="17" fill="#263045">ВГТУ</text>
      </svg>
      <h1 class="text-white font-bold text-lg">Управление образовательными программами</h1>
      <p class="text-vgtu-gold text-sm mt-1">Воронежский государственный технический университет</p>
    </div>

    <!-- Форма -->
    <div class="bg-white rounded-b-lg shadow-lg px-8 py-6">
      <h2 class="text-gray-700 font-semibold text-center mb-5">Вход в систему</h2>

      {% if error %}
      <div class="bg-red-50 border border-red-200 text-red-700 text-sm rounded px-4 py-3 mb-4">
        {{ error }}
      </div>
      {% endif %}

      <form method="post" action="/auth/login" class="space-y-4">
        <div>
          <label class="block text-sm text-gray-600 mb-1">Email</label>
          <input type="email" name="email" required autocomplete="email"
                 class="w-full border border-gray-300 rounded px-3 py-2 text-sm
                        focus:outline-none focus:border-vgtu-dark focus:ring-1 focus:ring-vgtu-dark">
        </div>
        <div>
          <label class="block text-sm text-gray-600 mb-1">Пароль</label>
          <input type="password" name="password" required autocomplete="current-password"
                 class="w-full border border-gray-300 rounded px-3 py-2 text-sm
                        focus:outline-none focus:border-vgtu-dark focus:ring-1 focus:ring-vgtu-dark">
        </div>
        <button type="submit"
                class="w-full bg-vgtu-dark text-white py-2 rounded text-sm font-semibold
                       hover:bg-blue-900 transition-colors mt-2">
          Войти
        </button>
      </form>
    </div>
  </div>
</body>
</html>
